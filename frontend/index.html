<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>CasaGuide — Espace propriétaire</title>

<!-- Cartes -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<!-- Typographies de l'identité CasaGuide -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app" aria-live="polite"></div>
  <div id="toasts" aria-live="assertive"></div>

  <!-- Leaflet (chargé avant l'app pour que L soit disponible) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Icônes Lucide : améliorent l'UI, l'app reste utilisable sans (libellés
       textuels toujours présents). Chargé en amont, non bloquant. -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <script type="module" src="js/app.js"></script>

</html>
