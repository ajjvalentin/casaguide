<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CasaGuide — Project Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--sand:#FAF7F2;--shell:#FFF;--ink:#1E2A32;--muted:#6B7A84;--sea:#0E5A73;
        --line:#E7E0D4;--ok:#2E7D32;--prog:#EF6C00;--todo:#90A4AE;--block:#C62828;--lock:#5E35B1}
  *{box-sizing:border-box}
  body{margin:0;background:var(--sand);color:var(--ink);
       font-family:"Instrument Sans",system-ui,sans-serif;font-variant-numeric:tabular-nums}
  .wrap{max-width:900px;margin:0 auto;padding:0 20px 80px}
  header{padding:32px 0 8px}
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  h1{font-family:Fraunces,serif;font-size:32px;margin:.1em 0}
  .rule{font-size:13px;background:#FFF6E5;border:1px solid #F0E2C0;border-radius:10px;
        padding:10px 14px;color:#7A5A12;margin:14px 0}
  .global{background:var(--shell);border:1px solid var(--line);border-radius:14px;
          padding:18px 20px;margin:18px 0;display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .pct{font-family:Fraunces,serif;font-size:44px;font-weight:700;color:var(--sea)}
  .bar{flex:1;min-width:220px;height:12px;background:#EEE8DC;border-radius:6px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--sea);border-radius:6px}
  .counts{display:flex;gap:8px;flex-wrap:wrap;font-size:12.5px}
  .counts button{border:1px solid var(--line);background:var(--shell);border-radius:999px;
        padding:5px 12px;cursor:pointer;font-weight:500}
  .counts button.on{outline:2px solid var(--sea)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}
  h2{font-family:Fraunces,serif;font-size:21px;margin:34px 0 4px}
  .phead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .pbar{height:7px;background:#EEE8DC;border-radius:4px;overflow:hidden;margin:6px 0 12px}
  .pbar i{display:block;height:100%;background:var(--ok)}
  .ppct{font-size:13px;color:var(--muted)}
  table{width:100%;border-collapse:collapse;background:var(--shell);border:1px solid var(--line);
        border-radius:12px;overflow:hidden;font-size:13.5px}
  th{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);
     text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);background:#FCFAF6}
  td{padding:9px 12px;border-bottom:1px solid #F1ECE2;vertical-align:top}
  tr:last-child td{border-bottom:none}
  td.id{color:var(--muted);white-space:nowrap;font-size:12px}
  .badge{display:inline-block;border-radius:6px;padding:2px 9px;font-size:11.5px;
         font-weight:600;color:#fff;white-space:nowrap}
  td.date{white-space:nowrap;color:var(--muted);font-size:12.5px}
  td.proof{font-size:12px;color:var(--muted)}
  td.proof code{background:#F4F0E7;border-radius:4px;padding:1px 5px;font-size:11.5px}
  footer{margin-top:44px;font-size:12px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">CasaGuide · Point de situation</div>
    <h1>Project Tracker</h1>
    <div class="rule"><b>Règle absolue</b> — une tâche n'est <b>DONE</b> que si : statut DONE
      + date renseignée + preuve concrète référencée (fichier, commit, résultat de test).
      Ce document est le seul état d'avancement reconnu du projet.</div>
  </header>

  <div class="global">
    <div><div class="pct" id="gpct">–</div><div class="ppct">du MVP réalisé</div></div>
    <div class="bar"><i id="gbar" style="width:0%"></i></div>
    <div class="counts" id="counts"></div>
  </div>

  <main id="phases"></main>
  <footer id="meta"></footer>
</div>

<script>

       status:"DONE", date:"2026-07-11", proof:"db/seed.sql — idempotence testée (double exécution), cohérence JSONB vérifiée"},
      {id:"F-04", item:"Pipeline d'enrichissement (géocodage→Overpass→OSRM→Claude→DB)",
       status:"DONE", date:"2026-07-11", proof:"backend/enrich/ — 2 tests d'intégration verts (test_pipeline.py)"},
      {id:"F-05", item:"Dépôt structuré + CLAUDE.md + Git initialisé",

      {id:"F-06", item:"API FastAPI : auth JWT, CRUD logements, enrichissement en tâche de fond, validation POI, guide public",
       status:"DONE", date:"2026-07-11", proof:"backend/api/ (17 endpoints) — commit c5537b4, 11 tests verts"},
      {id:"F-07", item:"Test réel de bout en bout (durcissement : repli géocodage, miroirs Overpass, disjoncteur OSRM, tolérance par catégorie)",
       status:"DONE", date:"2026-07-11", proof:"125 POI réels Orihuela Costa, coût IA 3,45 ct — guide_result.json"},

    ]},
    { id:"P1", title:"Phase 1 — MVP (CdC §12.1)", mvp:true, items:[
      {id:"M-01", item:"Correctifs qualité post-test : filtres POI (militaires, incohérences catégorie), prompt anti-hallucination, quota hors jobs failed, requalification jobs orphelins, perf Overpass, encodage UTF-8",
       status:"DONE", date:"2026-07-12", proof:"overpass.py (filtres cohérence + aéroports publics + dédoublonnage santé + fetch_grouped ~5 requêtes), claude_enrich.py (_POI_PROMPT anti-hallucination), api/repo.py (quota hors failed), api/main.py (lifespan requalifie jobs orphelins) — 20 tests verts (test_overpass_quality.py + test_api.py). Diagnostic job 6c450f9e : supermarket/taxi = échecs Overpass 406 transitoires (corrigés par regroupement), train_station = absence de gare dans le rayon (donnée réelle). Encodage : base propre (0 U+FFFD, « encadrée » intact), mojibake = artefact d'export"},
      {id:"M-02", item:"Config production : JWT persistant, chargement .env, secrets documentés",
       status:"DONE", date:"2026-07-13", proof:"Chargement automatique de backend/.env au démarrage (enrich/envfile.py, appelé par api/__init__.py + enrich/__init__.py, override=False → respecte l'env exporté et les tests). backend/.env.example documenté ; .env dans .gitignore (vérifié). Avertissement de démarrage listant exactement les clés manquantes (api/config.py missing_production_config + api/main.py lifespan) — vérifié en live (log sans .env). README « Démarrage » réduit à : créer .env depuis .env.example puis uvicorn. Test live : uvicorn démarré SANS variables shell lit backend/.env (endpoint /secrets → 200)"},
      {id:"M-03", item:"Back-office : formulaire dynamique des 43 sections (généré depuis field_schema) + indicateur de complétude",
       status:"DONE", date:"2026-07-13", proof:"frontend/ SPA statique servie par FastAPI (api/main.py monte /). Éditeur : frontend/js/views/editor.js + components/dynform.js (types text/textarea/time/bool/number/select/url/phone + groupes repeat + secrets chiffrés + encarts IA), navigation par chapitres A→I avec complétude, sauvegarde par section (bouton + Cmd/Ctrl+S). Vérifié en navigateur headless (login/liste/éditeur/secret/repeat, 0 erreur JS) ; identité guide_preview.html"},
      {id:"M-04", item:"Back-office : écran de validation/rejet/édition des POI suggérés",
       status:"DONE", date:"2026-07-13", proof:"frontend/js/views/pois.js : liste par catégorie + carte Leaflet synchronisée (survol liste↔carte), Approuver/Rejeter/Modifier (nom, tél, site, description, coup de cœur), « tout approuver » par catégorie, filtres suggérés/retenus/rejetés. list_pois enrichi (catégorie/icône/couleur) — api/repo.py. Rendu navigateur vérifié"},
      {id:"M-05", item:"Back-office : éditeur de position du logement sur carte (si précision ≠ rooftop)",
       status:"DONE", date:"2026-07-13", proof:"editor.js : bandeau d'alerte si geocode_accuracy≠rooftop + mini-carte à marqueur déplaçable → PATCH lat/lon (geocode_source='manual') puis proposition de recalcul. Nouvel endpoint POST /recompute-distances (api/routers/properties.py, injectable pour tests) + GET /stats — 4 tests d'intégration verts (test_api.py, 24 au total)"},
      {id:"M-06", item:"Back-office : saisie des secrets chiffrés (wifi, boîte à clés) + QR wifi auto",
       status:"DONE", date:"2026-07-14", proof:"Module QR mutualisé : frontend/guide/qr.js exporte désormais qrMatrix + qrCanvas + wifiPayload/wifiEscape ; guide/app.js dédupliqué (utilise qrCanvas/wifiPayload). Nouveau composant frontend/js/components/wifiqr.js : aperçu live du QR de connexion (norme WIFI:…) dans la section Wifi de l'éditeur (dynform.js le câble sur les champs SSID/mot de passe) + bouton « Télécharger le QR (PNG) » haute résolution (canvas.toDataURL). Le mot de passe est lu depuis les secrets déjà chargés (GET /secrets, propriétaire) et ne transite par AUCUN autre canal (généré côté navigateur). Styles app.css (.wifiqr). Vérifié en navigateur headless (CDP, éditeur authentifié) : QR rendu, bouton présent, 0 erreur JS ; le canvas RÉEL décode via zbar → « WIFI:T:WPA;S:VillaMarAzul;P:SoleilEte2026;; » (zbar lit les 8 masques ; OpenCV échoue sur le masque 6, décodeur faible)"},
      {id:"M-07", item:"Publication du guide + QR code PDF imprimable",
       status:"DONE", date:"2026-07-14", proof:"api/poster.py (reportlab, QR natif — aucune dépendance QR ajoutée) : PDF A5/A4 élégant (fond sable, titre serif façon Fraunces, accent mer, mot d'accueil FR/EN, pied CasaGuide). Endpoint GET /api/properties/{id}/guide-poster.pdf réservé au propriétaire (OwnedProperty), ?size=a4 optionnel. Le QR encode le lien PUBLIC /g/{guide_token} (jamais un secret) ; origine via CASAGUIDE_PUBLIC_BASE_URL sinon request.base_url. Boutons « QR à imprimer » (en-tête publié) et « QR code à imprimer » (modale de publication) dans editor.js ; api.posterBlob récupère le PDF protégé (jeton) et déclenche le téléchargement. requirements.txt : reportlab>=4.0. Tests : test_guide_poster_pdf (200/pdf, a4, size invalide→422, isolation 404, auth 401) + test_guide_poster_qr_encodes_public_guide_link (QR décodé via OpenCV sur le PDF rendu = URL publique exacte ; aucun secret dans les octets du PDF). Aperçu visuel validé"},
      {id:"M-08", item:"Guide voyageur PWA branché sur l'API (remplace le prototype) : sections + POI + carte + contacts cliquables",
       status:"DONE", date:"2026-07-13", proof:"L'URL /g/{token} sert désormais une PAGE HTML voyageur mobile-first (rendu côté serveur, api/guide_page.py — sections A→I visibles dans l'ordre du seed, champs selon field_schema/labels.fr, body_md en Markdown échappé, galeries photos + PDF, POI « distance d'abord » avec liseré de chapitre et règle >30 min→voiture, contacts appeler/WhatsApp/email, licence, barre d'urgences, area_facts). JSON conservé pour l'app sur /g/{token}/data (charset=utf-8 explicite, anti-mojibake Safari), secrets wifi/boîte à clés servis à la demande sur /g/{token}/secrets (mode 'link' uniquement, jamais dans le HTML ni /data), 404 propre si brouillon/token inconnu. App shell frontend/guide/ (modules ES natifs) : app.js (carte Leaflet + marqueurs par chapitre, chips de filtrage synchronisées liste/carte, visionneuse plein écran, chargement des secrets + boutons copier), qr.js (générateur QR autonome byte/M/v1-6, masque optimal — validé par décodage OpenCV sur les 8 masques), sw.js (service worker portée '/' via entête Service-Worker-Allowed du backend : app shell + dernier /data + /secrets + vignettes en cache → consultable hors-ligne après 1re visite ; tuiles = M-10 exclu), manifest PWA par guide (/g/{token}/manifest.webmanifest, start_url/scope propres), icônes 192/512/maskable. Back-office : boutons « Voir le guide » + « Copier le lien » sur logement publié (editor.js + properties.js). Tests : suite complète 34 verts (test_api.py — HTML servi/publié, 404 brouillon, sections masquées absentes du HTML, charset des JSON publics, secrets mode 'link' seulement, manifest par guide, entête service worker). Vérifié en navigateur headless (Chrome CDP, mobile 390px) : carte+9 tuiles+6 marqueurs, QR rendu, secrets remplis (boîte à clés masquée car section non visible), 0 erreur JS ; rechargement HORS-LIGNE → contenu + wifi toujours servis (cache SW)"},
      {id:"M-09", item:"Multilingue FR/EN/ES : traductions stockées, flag is_stale, sélecteur de langue",
       status:"DONE", date:"2026-07-14", proof:"Traductions GÉNÉRÉES ET STOCKÉES (§9, invariant 4 : aucune traduction à la volée côté voyageur). Backend : enrich/translate.py — extraction des SEULS segments textuels (champs text/textarea + groupes répétables + body_md ; jamais time/bool/number/url/phone/select ni secrets), traducteur injectable (ClaudeTranslator, modèle dédié CASAGUIDE_TRANSLATE_MODEL=claude-haiku-4-5-20251001 ~3× moins cher, JSON strict, tarifs Haiku dans settings.model_prices_usd), coûts dans api_costs (operation='translate'), ciblage strict (ne retraite QUE le manquant/périmé). enrich/db.py : lectures/écritures section_translations & poi_translations (upsert is_stale=FALSE, delete si texte retiré) + set_published_langs. api/repo.py : is_stale=TRUE posé à chaque upsert_section / edit_poi ; guide lit UNIQUEMENT les traductions fraîches (is_stale=FALSE → repli élégant sur le fr, jamais d'info obsolète) ; translation_status (à jour / X périmés par langue). Déclenchement : tâche de fond à la (re)publication (properties.py PATCH status='published') + endpoint POST /api/properties/{id}/translate (trigger='translate', HORS quota d'enrichissement) ; runner injectable (deps.get_translation_runner). Guide : GET /g/{token}?lang=es (et /data?lang=es) rendus côté serveur dans la langue demandée (guide_page.py entièrement localisé : name_i18n du seed, labels de champs i18n, dictionnaire statique FR/EN/ES des libellés fixes + noms de chapitres + valeurs select, repli fr si traduction manquante) ; overlay du contenu textuel depuis les traductions, champs structurés (heures…) jamais traduits. Sélecteur de langue dans l'en-tête (liens ?lang=xx rendus serveur, actifs) ; app.js mémorise le choix (localStorage) et détecte navigator.language au 1er chargement (redirection SSR). Cahier /s reste FR (hors périmètre). SW v3. Tests : 4 d'intégration (publication→es servi + repli fr, coût enregistré + secret jamais traduit, is_stale + re-traduction ciblée + repli fr sur section périmée, traduction hors quota) + 6 unitaires (extraction/réinjection, exclusion des champs non textuels, parsing/coût du traducteur, clés inconnues écartées, lot vide) — suite complète 51 verts"},
      {id:"M-10", item:"Mode hors-ligne PWA (service worker, cache guide + tuiles zone)",
       status:"TODO", date:"", proof:""},
      {id:"M-11", item:"Déploiement production UE (HTTPS, sauvegardes, monitoring)",
       status:"DONE", date:"2026-07-15", proof:"VPS Infomaniak (Ubuntu 24.04, UE) EN LIGNE sur http://179.237.85.250 (et https auto-signé). Architecture simple sans Docker : uvicorn (systemd casaguide, User=casaguide, durci NoNewPrivileges/ProtectSystem, EnvironmentFile .env + .env.deploy) derrière Caddy (reverse proxy 127.0.0.1:8000, gzip/zstd, en-têtes sécurité, Server masqué, logs /var/log/caddy, HSTS prêt commenté). PostgreSQL 16.14 + PostGIS 3.4 LOCAL uniquement (listen_addresses=localhost, rôle+base casaguide en peer auth, schéma+seed+migrations chargés : 49 sections/27 catégories/3 plans). uvicorn n'écoute que sur 127.0.0.1:8000. Sécurité : ufw 22/80/443, fail2ban (jail sshd active), unattended-upgrades, 134 MàJ appliquées + reboot. Utilisateur casaguide non-root, code /opt/casaguide cloné depuis GitHub via DEPLOY KEY ed25519 lecture seule (ssh config dédiée). Secrets : .env généré sur place (JWT+SECRET via openssl rand -hex 32, 600 casaguide), ANTHROPIC_API_KEY=placeholder (à fournir). VERSIONNAGE ASSETS (dette résolue) : deploy.sh stampe CASAGUIDE_ASSET_VERSION=SHA git → api/assets.py sert index+pages guide avec ?v=<sha>, statiques en Cache-Control:no-cache (revalidation ETag), SHA injecté dans le nom des caches du service worker (/guide/sw.js placeholder) → chaque déploiement invalide caches navigateur + SW sans Cmd+Opt+R (4 tests verts, suite 55 verte). DEPLOY EN UNE COMMANDE : /opt/casaguide/deploy.sh (pull, pip si requirements changé, migrations+seed idempotents, version, restart via sudoers restreint, healthcheck /health+/docs+/=200) — exécuté avec succès (version ab51933). SAUVEGARDES : timer systemd nocturne 03:30 (pg_dump -Fc + tar médias, rotation 14j, ops/casaguide-backup.*) TESTÉ ; restauration ops/casaguide-restore.sh en base témoin TESTÉE avec données réelles (properties=2, owners=3 restaurés). VALIDATION API réelle à travers Caddy : /=200 /docs=200 /health=200, inscription→JWT→/me→création logement→section→publication→guide /g/{token}=200 (nom       {id:"M-12", item:"Photos & documents par section : upload (télécommandes, boîte à clés, plan des poubelles…), table media, stockage local → S3, affichage éditeur + guide",
       status:"DONE", date:"2026-07-13", proof:"Backend : api/storage.py (interface Storage abstraite + LocalStorage sous MEDIA_ROOT, clés non devinables token 128 bits, anti-path-traversal, prêt S3), api/media_files.py (type réel par magic bytes jpeg/png/webp/pdf, 10 Mo max, ré-encodage/strip EXIF via Pillow + réduction 2000 px), api/routers/media.py (upload multipart, liste, service, légende, réordonnancement, suppression ; isolation via OwnedProperty). Guide public : médias des sections VISIBLES seulement + niveau logement, jamais une section masquée (repo.guide_media / get_public_media, endpoint /g/{token}/media/{id}). Frontend : components/media.js (zone Photos par section — ajout bouton + glisser-déposer, vignettes via blob authentifié, légende éditable, suppression, réordonnancement flèches + drag, compression canvas des gros JPEG/WebP) intégrée à editor.js ; styles app.css. Tests : 6 tests d'intégration (upload OK, type refusé 415, taille refusée 413, isolation 404, réordonnancement, visibilité guide publié uniquement) — suite complète 30 verts. Vérifié en live (HTTP réel + éditeur en navigateur headless : panneau médias rendu, vignette servie)"},
      {id:"M-13", item:"Cahier de préparation pour l'équipe d'entretien : sections audience='staff' (check-list de tâches, welcome pack illustré, dotation linge selon nb de voyageurs, consommables à vérifier, souhaits particuliers), second lien secret /s/{staff_token} distinct du lien voyageur, page mobile dédiée réutilisant le moteur de rendu M-08 — jamais visible des voyageurs, cases à cocher par séjour en V2",
       status:"DONE", date:"2026-07-14", proof:"Schéma : audience TEXT NOT NULL DEFAULT 'guest' ('guest'|'staff') sur section_templates + staff_token (128 bits, unique) sur properties — schema.sql (fresh) + db/migrations/002_staff_cahier.sql (existant, IF NOT EXISTS). Seed : chapitre « S » (5 sections staff : S_checklist repeat tâche+précisions, S_welcome_pack texte+photos, S_linen dotation structurée draps/serviettes bain/plage + notes, S_supplies repeat consommable+quantité, S_special souhaits). Backend : repo.staff_sections/staff_media/get_property_by_staff_token/get_staff_media ; guide_page.render_staff (variante sobre check-list, réutilise _render_fields/_render_media/_md_to_html) ; routes /s/{staff_token} + /s/{staff_token}/media/{id} (guide.py) — accessibles MÊME EN BROUILLON (l'équipe prépare avant publication, justifié dans le code) ; 404 propre si token inconnu. Étanchéité (invariant 7) : guide_sections/guide_media/get_public_media filtrent audience='guest' ; property_stats compte les guest uniquement (dashboard reste à 44). PropertyOut expose staff_token. Front : editor.js — groupe distinct « Équipe d'entretien » (même dynform + panneau médias) + bandeau du lien /s (copier/ouvrir). CSS staff sobre (guide.css). Tests : étanchéité guest↔staff dans les DEUX sens, accès staff en brouillon (+ /g 404), secrets jamais sur /s, médias staff servis sur /s mais 404 sur /g, stats excluent staff, token inconnu 404. Vérifié en navigateur headless (CDP) : cahier /s rendu (check-list + linge + souhaits, aucune fuite guest), éditeur staff + lien /s, 0 erreur JS. Suite : 41 verts"},

const COLORS = {DONE:"var(--ok)", IN_PROGRESS:"var(--prog)", TODO:"var(--todo)",
                BLOCKED:"var(--block)", LOCKED:"var(--lock)"};
let activeFilter = null;

function render(){
  const all = PROJECT.phases.flatMap(p=>p.items);
  const mvp = PROJECT.phases.filter(p=>p.mvp).flatMap(p=>p.items);
  const done = s=>s.filter(i=>i.status==="DONE"||i.status==="LOCKED").length;
  const pct = Math.round(100*done(mvp)/mvp.length);
  document.getElementById("gpct").textContent = pct+" %";
  document.getElementById("gbar").style.width = pct+"%";

  const counts = document.getElementById("counts"); counts.innerHTML="";
  for (const st of ["DONE","IN_PROGRESS","TODO","BLOCKED","LOCKED"]){
    const n = all.filter(i=>i.status===st).length; if(!n && st!=="IN_PROGRESS") continue;
    const b = document.createElement("button");
    b.innerHTML = `<span class="dot" style="background:${COLORS[st]}"></span>${st} · ${n}`;
    if (activeFilter===st) b.classList.add("on");
    b.onclick = ()=>{ activeFilter = activeFilter===st ? null : st; render(); };
    counts.appendChild(b);
  }

  const main = document.getElementById("phases"); main.innerHTML="";
  for (const ph of PROJECT.phases){
    const d = done(ph.items), t = ph.items.length, p = Math.round(100*d/t);
    const sec = document.createElement("section");
    sec.innerHTML = `<div class="phead"><h2>${ph.title}</h2>
        <span class="ppct">${d}/${t} · ${p} %</span></div>
      <div class="pbar"><i style="width:${p}%"></i></div>`;
    const rows = ph.items.filter(i=>!activeFilter||i.status===activeFilter);
    if (rows.length){
      const tb = document.createElement("table");
      tb.innerHTML = `<tr><th>ID</th><th>Tâche</th><th>Statut</th><th>Date</th><th>Preuve</th></tr>` +
        rows.map(i=>`<tr>
          <td class="id">${i.id}</td><td>${i.item}</td>
          <td><span class="badge" style="background:${COLORS[i.status]}">${i.status}</span></td>
          <td class="date">${i.date||"—"}</td>
          <td class="proof">${i.proof?`<code>${i.proof}</code>`:"—"}</td></tr>`).join("");
      sec.appendChild(tb);
    }
    main.appendChild(sec);
  }
  document.getElementById("meta").textContent =
    `Dernière mise à jour : ${PROJECT.updated} · Source de vérité unique du projet CasaGuide`;
}
render();
</script>
